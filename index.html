<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pangil-music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <!-- GA4: 아래 G-XXXXXXXXXX를 본인 측정 ID로 바꾸세요 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-PM7EGDH7GZ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-PM7EGDH7GZ");
    </script>
  </head>
  <body>
    <div class="reference-cta" role="region" aria-label="original reel link">
      <p class="reference-cta-text">
        원본 릴스 동선 참고하고 콤보를 만들어보세요.
      </p>
      <a
        class="reference-cta-link"
        href="https://www.instagram.com/reel/DWFip86CQ9k/?igsh=MTBlYWxzeGxwMGxzMg=="
        target="_blank"
        rel="noopener noreferrer"
      >
        원본 릴스 보기
      </a>
    </div>

    <section class="sound-section" aria-label="effect sound board">
      <h2 class="sound-title">한로로 - 0+0 강남스타일 리믹스 런치패드</h2>
      <div>
        <p>
          이 페이지는 리믹스 효과음을 버튼으로 빠르게 재생할 수 있는 미니
          런치패드입니다. 원하는 타이밍에 버튼을 눌러 샘플을 겹쳐보면서 조합을
          맞춰보세요.
        </p>
        <p>
          사용법: 버튼을 누르면 해당 사운드가 즉시 재생됩니다. 같은 버튼을 다시
          누르면 처음부터 다시 재생됩니다.
        </p>
      </div>
      <div class="sound-grid" id="soundGrid"></div>
    </section>

    <section class="sound-section" aria-label="meme combo maker">
      <h2 class="sound-title">나만의 밈 콤보 만들기</h2>
      <div class="combo-builder">
        <input
          id="comboName"
          class="combo-input"
          type="text"
          maxlength="24"
          placeholder="콤보 이름 (예: 출근 5초전)"
        />
        <div id="comboSourceGrid" class="mini-grid"></div>
        <div id="sequenceList" class="sequence-list"></div>
        <button id="saveComboButton" class="combo-save-button" type="button">
          콤보 저장
        </button>
      </div>
      <div>
        <h3 class="combo-subtitle">저장된 콤보</h3>
        <div class="speed-controls">
          <label for="globalSpeedSelect">기본 배속</label>
          <select id="globalSpeedSelect" class="speed-select">
            <option value="1">x1</option>
            <option value="1.5">x1.5</option>
            <option value="2">x2</option>
          </select>
        </div>
        <div id="comboList" class="combo-list"></div>
      </div>
    </section>

    <div id="referenceModal" class="modal-backdrop" hidden>
      <div
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="referenceModalTitle"
      >
        <h3 id="referenceModalTitle" class="modal-title">원본 릴스 참고</h3>
        <p class="modal-text">아래에서 원본 릴스를 바로 확인해보세요.</p>
        <div class="modal-embed-wrap">
          <iframe
            class="modal-embed"
            src="https://www.instagram.com/reel/DWFip86CQ9k/embed"
            title="Instagram Reel Reference"
            loading="lazy"
            allowfullscreen
          ></iframe>
        </div>
        <div class="modal-actions">
          <a
            class="modal-open-link"
            href="https://www.instagram.com/reel/DWFip86CQ9k/?igsh=MTBlYWxzeGxwMGxzMg=="
            target="_blank"
            rel="noopener noreferrer"
          >
            원본 릴스 열기
          </a>
          <button
            id="closeModalButton"
            class="modal-close-button"
            type="button"
          >
            닫기
          </button>
        </div>
        <label class="modal-checkbox">
          <input id="hideModalToggle" type="checkbox" />
          다시 보지 않기
        </label>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
