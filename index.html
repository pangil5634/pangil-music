<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pangil-music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="sound-section" aria-label="effect sound board">
      <h2 class="sound-title">한로로 - 0+0 강남스타일 리믹스 런치패드</h2>
      <div>
        <p>
          이 페이지는 리믹스 효과음을 버튼으로 빠르게 재생할 수 있는 미니 런치패드입니다.
          원하는 타이밍에 버튼을 눌러 샘플을 겹쳐보면서 조합을 맞춰보세요.
        </p>
        <p>
          사용법: 버튼을 누르면 해당 사운드가 즉시 재생됩니다. 같은 버튼을 다시 누르면 처음부터 다시
          재생됩니다.
        </p>
      </div>
      <div class="sound-grid" id="soundGrid"></div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
